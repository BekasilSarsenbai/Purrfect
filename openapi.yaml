        '200':
          description: Ready
        '503':
          description: At least one dependency is down
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: not_ready }
                  checks:
                    type: object
                    properties:
                      db: { type: string, enum: [up, down] }
                      redis: { type: string, enum: [up, down] }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CursorParam:
      in: query
      name: cursor
      required: false
      schema:
        type: string
      description: Opaque keyset cursor from previous page
      example: eyJjcmVhdGVkQXQiOiIyMDI2LTA0LTA3VDEzOjQyOjAwWiIsImlkIjoiY2YxMiJ9
    LimitParam:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ListingIdParam:
      in: path
      name: listingId
      required: true
      schema:
        type: string
        format: uuid
    OrderIdParam:
      in: path
      name: orderId
      required: true
      schema:
        type: string
        format: uuid
    DisputeIdParam:
      in: path
      name: disputeId
      required: true
      schema:
        type: string
        format: uuid
    UserIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: BAD_REQUEST
            message: Invalid query parameter value
    Unauthorized:
      description: Authentication failed or token missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: Access token is invalid or expired
    Forbidden:
      description: Authenticated but missing required role/permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN
            message: Admin role is required
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: NOT_FOUND
            message: Listing not found
    Conflict:
      description: Business state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CONFLICT
            message: Order is already in disputed state
    UnprocessableEntity:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: inspection report URL is required
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INTERNAL_ERROR
            message: Unexpected server error
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: TOO_MANY_REQUESTS
            message: Too many auth attempts. Try again in 1 minute.

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true

    RegisterRequest:
      type: object
      required: [email, password, displayName, role]
      properties:
        email:
          type: string
          format: email
          example: buyer01@purrfect.kz
        password:
          type: string
          minLength: 8
          example: Str0ngPass!23
        displayName:
          type: string
          example: Aigerim K.
        role:
          type: string
          enum: [BUYER, SELLER]
          example: BUYER

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: seller01@purrfect.kz
        password:
          type: string
          example: StrongSellerPass123

    UpdateUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [BUYER, SELLER, MODERATOR, ADMIN]
          example: MODERATOR
        reason:
          type: string
          nullable: true
          example: Escalated user to moderation team for on-call rotation.

    UpdateUserStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DELETED]
          example: SUSPENDED
        reason:
          type: string
          nullable: true
          example: Suspended due to repeated policy violations.

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access.payload
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.payload
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [BUYER, SELLER, MODERATOR, ADMIN]
        displayName:
          type: string
        trustScore:
          type: integer
          example: 76

    CreateListingRequest:
      type: object
      required: [title, description, breed, gender, birthDate, vaccinationStatus, priceKzt, city]
      properties:
        title:
          type: string
          example: Scottish Fold kitten, vaccinated
        description:
          type: string
          example: Playful kitten with health passport and first vaccine.
        breed:
          type: string
          example: Scottish Fold
        gender:
          type: string
          enum: [MALE, FEMALE]
          example: FEMALE
        birthDate:
          type: string
          format: date
          example: '2026-01-12'
        vaccinationStatus:
          type: string
          example: 1st dose completed
        priceKzt:
          type: number
          format: double
          example: 250000
        city:
          type: string
          example: Astana

    UpdateListingRequest:
      type: object
      properties:
        title:
          type: string
          example: British Shorthair kitten with passport
        description:
          type: string
          example: Updated health notes and photo set.
        vaccinationStatus:
          type: string
          example: 2nd dose completed
        priceKzt:
          type: number
          format: double
          example: 280000
        city:
          type: string
          example: Almaty

    Listing:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        title:
          type: string
        breed:
          type: string
        priceKzt:
          type: number
          format: double
        city:
          type: string
        status:
          type: string
          enum: [DRAFT, PENDING_REVIEW, PUBLISHED, RESERVED, SOLD, REJECTED, ARCHIVED]
        riskScore:
          type: integer
          example: 34
        createdAt:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required: [listingId]
      properties:
        listingId:
          type: string
          format: uuid
          example: b8f198e7-ea6b-4d4a-a5bc-faf9d32d6ca7
        idempotencyKey:
          type: string
          example: ord_01J9J4XX45QCNH7Y

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listingId:
          type: string
          format: uuid
        buyerId:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [CREATED, FUNDED_100, HANDOVER_CONFIRMED, INSPECTION_ACTIVE, DISPUTED, COMPLETED, CANCELLED]
        totalAmountKzt:
          type: number
          format: double
          example: 250000
        payout1Kzt:
          type: number
          format: double
          example: 118750
        payout2Kzt:
          type: number
          format: double
          example: 118750
        inspectionDeadline:
          type: string
          format: date-time

    InspectionSubmitRequest:
      type: object
      required: [clinicName, reportUrl, outcome]
      properties:
        clinicName:
          type: string
          example: Almaty Vet Care
        reportUrl:
          type: string
          format: uri
          example: https://files.purrfect.kz/reports/rep_123.pdf
        outcome:
          type: string
          enum: [PASSED, FAILED]
          example: PASSED
        notes:
          type: string
          example: General health normal, no critical findings.

    Inspection:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, PASSED, FAILED, EXPIRED]
        deadlineAt:
          type: string
          format: date-time
        submittedAt:
          type: string
          format: date-time
          nullable: true

    CreateDisputeRequest:
      type: object
      required: [orderId, reasonCode]
      properties:
        orderId:
          type: string
          format: uuid
        reasonCode:
          type: string
          enum: [HEALTH_MISMATCH, FAKE_BREED_DOCS, NOT_AS_DESCRIBED, OTHER]
          example: HEALTH_MISMATCH
        evidenceUrls:
          type: array
          items:
            type: string
            format: uri
          example:
            - https://files.purrfect.kz/evidence/photo1.jpg
            - https://files.purrfect.kz/evidence/vet-note.pdf
        description:
          type: string
          example: Vet found congenital issue not disclosed in listing.

    ResolveDisputeRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          enum: [REFUND_FULL, REFUND_PARTIAL, RELEASE_SELLER]
        refundAmountKzt:
          type: number
          format: double
          nullable: true
          example: 50000
        note:
          type: string
          example: Partial refund approved based on medical evidence.

    Dispute:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        status:
          type: string
          enum: [OPEN, UNDER_REVIEW, RESOLVED_REFUND_FULL, RESOLVED_REFUND_PARTIAL, RESOLVED_RELEASE_SELLER, REJECTED]
        reasonCode:
          type: string
        openedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true

    AddDisputeEvidenceRequest:
      type: object
      required: [evidenceType, fileUrl]
      properties:
        evidenceType:
          type: string
          enum: [PHOTO, VIDEO, PDF_REPORT, CHAT_SCREENSHOT, OTHER]
          example: PDF_REPORT
        fileUrl:
          type: string
          format: uri
          example: https://files.purrfect.kz/evidence/report_224.pdf
        note:
          type: string
          example: Vet report confirming congenital heart issue.

    DisputeEvidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        disputeId:
          type: string
          format: uuid
        uploaderId:
          type: string
          format: uuid
        evidenceType:
          type: string
          enum: [PHOTO, VIDEO, PDF_REPORT, CHAT_SCREENSHOT, OTHER]
        fileUrl:
          type: string
          format: uri
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        actorUserId:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        beforeJson:
          type: object
          nullable: true
        afterJson:
          type: object
          nullable: true
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PageMeta:
      type: object
      required: [hasNext, nextCursor]
      properties:
        hasNext:
          type: boolean
        nextCursor:
          type: string
          nullable: true

    PaginatedListings:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Listing'
        meta:
          $ref: '#/components/schemas/PageMeta'

    PaginatedOrders:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        meta:
          $ref: '#/components/schemas/PageMeta'

    PaginatedDisputes:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Dispute'
        meta:
          $ref: '#/components/schemas/PageMeta'

    PaginatedDisputeEvidence:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DisputeEvidence'
        meta:
          $ref: '#/components/schemas/PageMeta'

    PaginatedAuditLogs:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        meta:
          $ref: '#/components/schemas/PageMeta'
