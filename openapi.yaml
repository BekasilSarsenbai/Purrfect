        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/verify-email:
    post:
      tags: [auth]
      summary: Confirm email ownership using the verification token
      description: >
        Token is sent in the verification email queued during registration. One-time use,
        24h TTL. Accepts the token in the JSON body or as `?token=` query parameter
        (so the email link works directly).
      parameters:
        - in: query
          name: token
          required: false
          schema: { type: string, minLength: 16, maxLength: 256 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string, example: 06dae34d4400d2e57e40f6667a6570083cf4c47d6b6f1470362b767c7f879a95 }
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  alreadyVerified: { type: boolean, example: false }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/resend-verification:
    post:
      tags: [auth]
      summary: Re-send the verification email (rate-limited, always 200 to avoid enumeration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email, example: buyer@purrfect.local }
      responses:
        '200':
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429':
          description: Too many requests
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/forgot-password:
    post:
      tags: [auth]
      summary: Start password reset (always returns 200 to prevent enumeration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email, example: buyer.demo@purrfect.kz }
      responses:
        '200':
          description: Reset link issued (or pretended to be issued)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  devToken:
                    type: string
                    description: Only present when NODE_ENV != production. Use directly in /auth/reset-password.
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/reset-password:
    post:
      tags: [auth]
      summary: Complete password reset using a token from /auth/forgot-password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string, example: 'a3f1...32hex' }
                newPassword: { type: string, minLength: 8, example: 'NewStr0ngPass!23' }
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalError' }

